version: '3.8'

services:
  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: excalidraw
    restart: always
    ports:
      - "3030:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:80']
      interval: 30s
      timeout: 10s
      retries: 3
