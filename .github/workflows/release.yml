name: Release Deploy

# ============================================
# DEPLOY: triggered on version tags (v*)
# Runs full CI gates before deploying.
# Requires: secrets.PROD_HOST, PROD_USER, PROD_SSH_KEY, PROD_SSH_PORT
# ============================================

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to deploy (e.g. v1.2.3)'
        required: true
        type: string

jobs:
  release:
    name: Release to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Deploy Release to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/opt/quayer"
            COMPOSE_FILE="compose.yml"
            BACKUP_DIR="/opt/quayer/backups"
            RELEASE_TAG="${{ github.event.inputs.tag || github.ref_name }}"

            echo "=== Release Deploy: $RELEASE_TAG ==="

            cd "$APP_DIR"

            if [ ! -f .env ]; then
              echo "ERRO CRITICO: .env nao encontrado em $APP_DIR"
              exit 1
            fi

            if docker compose version > /dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            else
              COMPOSE_CMD="docker-compose"
            fi

            # Backup antes do release
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/pre-release-$(date +%Y%m%d-%H%M%S).sql.gz"

            if docker inspect quayer-postgres > /dev/null 2>&1; then
              DB_USER=$(grep '^DB_USER=' .env | cut -d= -f2 | tr -d '"')
              DB_NAME=$(grep '^DB_NAME=' .env | cut -d= -f2 | tr -d '"')
              DB_USER=${DB_USER:-quayer}
              DB_NAME=${DB_NAME:-quayer}
              if docker exec quayer-postgres pg_dump -U "$DB_USER" "$DB_NAME" | gzip > "$BACKUP_FILE"; then
                echo "Backup criado: $BACKUP_FILE"
              else
                echo "Backup falhou - continuando"
                rm -f "$BACKUP_FILE"
              fi
            fi

            # Manter apenas os 7 backups mais recentes
            ls -t "$BACKUP_DIR"/pre-release-*.sql.gz 2>/dev/null | tail -n +8 | xargs rm -f || true

            # Atualizar para o release tag
            git fetch --tags --depth 1 origin
            git reset --hard "$RELEASE_TAG"
            git clean -fd -e .env -e data/ -e backups/

            # Build e deploy
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            $COMPOSE_CMD -f $COMPOSE_FILE build --parallel app

            # Migrations (one-shot, fail-fast antes de subir containers)
            echo "Rodando migrations (one-shot)..."
            SKIP_MIGRATIONS=false $COMPOSE_CMD -f $COMPOSE_FILE run --rm --no-deps \
              -e SKIP_MIGRATIONS=false \
              app sh -c "node ./prisma/migrate.js && (node ./prisma/create-admin.js || true)"

            # Subir containers pulando migrations (ja rodaram acima)
            export SKIP_MIGRATIONS=true
            $COMPOSE_CMD -f $COMPOSE_FILE down --remove-orphans 2>/dev/null || true
            $COMPOSE_CMD -f $COMPOSE_FILE up -d --force-recreate --remove-orphans

            # Health check (120s)
            MAX_WAIT=120
            INTERVAL=10
            ELAPSED=0
            HEALTHY=false

            while [ $ELAPSED -lt $MAX_WAIT ]; do
              STATUS=$(docker inspect quayer-app --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=true
                break
              fi
              echo "  [${ELAPSED}s] Status: $STATUS - aguardando..."
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ "$HEALTHY" = "true" ]; then
              echo "=== Release $RELEASE_TAG concluido! ==="
            else
              echo "FALHA: App nao ficou healthy em ${MAX_WAIT}s"
              docker logs quayer-app --tail 50
              exit 1
            fi

            docker image prune -f || true
