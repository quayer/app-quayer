name: Hotfix Deploy (Fast)

# ============================================
# HOTFIX: Deploy rápido SEM rebuild de imagem
# ============================================
# Use para correções urgentes que não precisam rebuild:
# - Correções de banco de dados
# - Restart de containers
# - Atualização de .env
#
# Trigger manual: Actions > Hotfix Deploy > Run workflow

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Ação a executar'
        required: true
        default: 'restart'
        type: choice
        options:
          - restart        # Apenas restart do container app
          - pull-restart   # Git pull + restart (sem rebuild)
          - rebuild-app    # Rebuild apenas da app (usa cache)
          - full-rebuild   # Rebuild completo (sem cache)
          - db-migrate     # Rodar migrations do Prisma
          - logs           # Ver últimos logs
          - diagnose       # Diagnóstico de rede e Redis

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Hotfix
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            set -e

            APP_DIR="/opt/quayer"
            COMPOSE_FILE="docker-compose.quayer.yml"
            ACTION="${{ github.event.inputs.action }}"

            cd "$APP_DIR"

            # Detectar docker compose
            if docker compose version &> /dev/null; then
              COMPOSE_CMD="docker compose"
            else
              COMPOSE_CMD="docker-compose"
            fi

            echo "🔧 Executando: $ACTION"
            echo "================================================"

            case "$ACTION" in
              "restart")
                echo "🔄 Reiniciando todos os containers..."
                $COMPOSE_CMD -f $COMPOSE_FILE down --remove-orphans
                docker rm -f quayer-redis quayer-postgres quayer-app 2>/dev/null || true
                $COMPOSE_CMD -f $COMPOSE_FILE up -d --force-recreate --remove-orphans
                ;;

              "pull-restart")
                echo "📥 Atualizando código..."
                git fetch --all
                git reset --hard origin/main
                git clean -fd -e .env
                echo "🔄 Reiniciando container..."
                $COMPOSE_CMD -f $COMPOSE_FILE restart app
                ;;

              "rebuild-app")
                echo "📥 Atualizando código..."
                git fetch --all
                git reset --hard origin/main
                git clean -fd -e .env
                echo "🏗️ Rebuild com cache..."
                $COMPOSE_CMD -f $COMPOSE_FILE build app
                $COMPOSE_CMD -f $COMPOSE_FILE up -d --force-recreate app
                ;;

              "full-rebuild")
                echo "📥 Atualizando código..."
                git fetch --all
                git reset --hard origin/main
                git clean -fd -e .env
                echo "🏗️ Rebuild completo (sem cache)..."
                $COMPOSE_CMD -f $COMPOSE_FILE build --no-cache app
                $COMPOSE_CMD -f $COMPOSE_FILE up -d --force-recreate app
                ;;

              "db-migrate")
                echo "🗄️ Rodando migrations dentro do container..."
                docker exec quayer-app node ./prisma/migrate.js
                echo "👤 Garantindo usuário admin..."
                docker exec quayer-app node ./prisma/create-admin.js || true
                ;;

              "logs")
                echo "📋 Últimos logs:"
                docker logs quayer-app --tail 100
                exit 0
                ;;

              "diagnose")
                echo "🔍 Diagnóstico de containers e rede..."
                docker ps --format "{{.Names}}\t{{.Status}}\t{{.Networks}}"
                echo "---"
                echo "Env vars Redis no container:"
                docker exec quayer-app printenv | grep -E "REDIS|NEXT_PUBLIC" || echo "Container não disponível"
                echo "---"
                echo "Ping Redis do container app:"
                docker exec quayer-app node -e "
                  const r = require('net').createConnection(6379, 'quayer-redis');
                  r.on('connect', () => { console.log('TCP OK - Redis reachable'); r.end(); });
                  r.on('error', (e) => { console.log('TCP FAIL:', e.message); });
                  setTimeout(() => { console.log('timeout'); process.exit(1); }, 3000);
                " || true
                echo "---"
                echo "Docker networks:"
                docker network ls
                echo "---"
                echo "Container quayer-redis inspect (network):"
                docker inspect quayer-redis --format '{{json .NetworkSettings.Networks}}' || echo "quayer-redis não encontrado"
                exit 0
                ;;
            esac

            echo ""
            echo "⏳ Aguardando health check..."
            sleep 15

            # Verificar status
            STATUS=$(docker inspect quayer-app --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
            echo "📊 Status: $STATUS"

            if [ "$STATUS" = "healthy" ]; then
              echo "✅ Hotfix aplicado com sucesso!"
            else
              echo "⚠️ Container ainda não healthy. Logs recentes:"
              docker logs quayer-app --tail 20
            fi
