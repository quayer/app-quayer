name: Production Deploy

# ============================================
# DEPLOY AUTOMÁTICO ao fazer push na main
# ============================================
# Para deploys mais rápidos ou específicos use:
# - hotfix.yml: Restart/rebuild rápido
# - release.yml: Deploy de versão com tag

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Build sem cache (mais lento)'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/opt/quayer"
            COMPOSE_FILE="docker-compose.quayer.yml"
            NO_CACHE="${{ github.event.inputs.no_cache }}"

            echo "🔥 Iniciando Deploy Quayer..."
            echo "================================================"

            # Verificar/clonar repositório
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "⚠️ Repositório não encontrado. Clonando..."
              rm -rf "$APP_DIR"
              mkdir -p "$APP_DIR"
              git clone --depth 1 --single-branch --branch main https://github.com/quayer/app-quayer.git "$APP_DIR"
              cd "$APP_DIR"
            else
              cd "$APP_DIR"
              echo "📥 Atualizando código..."
              git fetch --depth 1 origin main
              git reset --hard origin/main
            fi

            # Preservar .env e dados do postgres (data/ é bind mount do postgres)
            git clean -fd -e .env -e data/

            git checkout main
            git pull origin main

            # Verificar .env
            if [ ! -f .env ]; then
              echo "❌ ERRO: .env não encontrado!"
              exit 1
            fi
            echo "✅ .env encontrado"

            # Garantir rede existe
            docker network inspect supabase_default &> /dev/null || docker network create supabase_default

            # Detectar docker compose
            if docker compose version &> /dev/null; then
              COMPOSE_CMD="docker compose"
            else
              COMPOSE_CMD="docker-compose"
            fi

            echo "🐳 Usando: $COMPOSE_CMD"

            # Limpar espaço em disco antes do build (sem --volumes para preservar dados)
            echo "🧹 Limpando espaço em disco..."
            docker system prune -af 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true
            rm -rf /tmp/* 2>/dev/null || true

            # Mostrar espaço disponível
            echo "📊 Espaço disponível:"
            df -h / | tail -1

            # Remover containers órfãos antes de iniciar (evita conflito de nomes)
            echo "🧹 Removendo containers antigos/órfãos..."
            $COMPOSE_CMD -f $COMPOSE_FILE down --remove-orphans 2>/dev/null || true
            docker rm -f quayer-redis quayer-postgres quayer-app 2>/dev/null || true

            # Build (com ou sem cache) - usando BuildKit para cache otimizado
            echo "🏗️ Construindo imagem..."
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1

            if [ "$NO_CACHE" = "true" ]; then
              echo "   (sem cache - mais lento)"
              $COMPOSE_CMD -f $COMPOSE_FILE build --no-cache app
            else
              echo "   (com cache BuildKit - mais rápido)"
              $COMPOSE_CMD -f $COMPOSE_FILE build --parallel app
            fi

            # Deploy - usando --remove-orphans para limpar containers antigos
            echo "🚀 Subindo aplicação..."
            $COMPOSE_CMD -f $COMPOSE_FILE up -d --force-recreate --remove-orphans

            # Aguardar health check (reduzido para deploy mais rápido)
            echo "⏳ Aguardando health check..."
            sleep 15

            STATUS=$(docker inspect quayer-app --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")

            if [ "$STATUS" = "healthy" ]; then
              echo "✅ App está healthy!"
            else
              echo "⚠️ Status: $STATUS - Verificando logs..."
              docker logs quayer-app --tail 30
            fi

            # Limpar imagens antigas
            docker image prune -f || true

            echo ""
            echo "================================================"
            echo "✅ Deploy concluído!"
            echo "🌐 https://app.quayer.com"
