name: Homol Deploy

# ============================================
# DEPLOY: manual (workflow_dispatch) → homol
# Arquitetura: build no runner GitHub Actions (7GB RAM) → push GHCR → servidor só faz pull
# Isso elimina OOM no servidor (3.8GB RAM) que crashava durante docker build
# Server: 167.235.139.140 (homol.quayer.com) via Cloudflare Tunnel
# ============================================

on:
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Build sem cache (ignora cache do runner)'
        required: false
        default: false
        type: boolean
      skip_backup:
        description: 'Pular backup do banco (use em primeiro deploy)'
        required: false
        default: false
        type: boolean

concurrency:
  group: homol-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/quayer-homol

jobs:
  # ============================================
  # 1. TESTES (estático + unit)
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: docker
          POSTGRES_PASSWORD: docker
          POSTGRES_DB: docker_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://docker:docker@localhost:5432/docker_test?schema=public

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck || npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit
        continue-on-error: true

  # ============================================
  # 2. BUILD DA IMAGEM (no runner, não no servidor)
  # GitHub Actions runners têm 7GB RAM — sem OOM
  # Imagem vai para GHCR — servidor só faz pull
  # ============================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    outputs:
      full_image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:homol-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=homol-,format=short
            type=raw,value=homol-latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.HOMOL_APP_URL }}
            NEXT_PUBLIC_IGNITER_API_URL=${{ secrets.HOMOL_APP_URL }}/
            NEXT_PUBLIC_IGNITER_API_BASE_PATH=/api/v1
            NEXT_PUBLIC_SIGNUP_ENABLED=false
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # 3. DEPLOY (servidor apenas faz pull + up)
  # Sem docker build no servidor → sem OOM
  # ============================================
  deploy:
    name: Deploy to Homol
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: homol
      url: https://homol.quayer.com

    steps:
      - name: Deploy via SSH (pull image + compose up)
        uses: appleboy/ssh-action@v1.0.3
        env:
          CF_TUNNEL_HOMOL_TOKEN: ${{ secrets.CF_TUNNEL_HOMOL_TOKEN }}
          DEPLOY_IMAGE: ${{ needs.build.outputs.full_image }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          SKIP_BACKUP: ${{ github.event.inputs.skip_backup }}
        with:
          host: ${{ secrets.HOMOL_HOST }}
          username: ${{ secrets.HOMOL_USER }}
          key: ${{ secrets.HOMOL_SSH_KEY }}
          port: ${{ secrets.HOMOL_SSH_PORT }}
          envs: CF_TUNNEL_HOMOL_TOKEN,DEPLOY_IMAGE,GITHUB_TOKEN,GITHUB_ACTOR,SKIP_BACKUP
          command_timeout: 20m
          script: |
            set -e

            APP_DIR="/opt/quayer-homol"
            COMPOSE_FILE="compose.homol.yml"
            ENV_FILE=".env.homol"
            BACKUP_DIR="/opt/quayer-homol/backups"

            # Swap: configurar uma vez para proteger contra OOM em operações futuras
            if [ ! -f /swapfile ]; then
              echo ">> Configurando swap de 4GB"
              sudo fallocate -l 4G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab > /dev/null
              echo "Swap ativo: $(free -h | grep Swap)"
            else
              echo "Swap já configurado: $(free -h | grep Swap)"
            fi

            # Rotacionar CF_TUNNEL_HOMOL_TOKEN no .env.homol
            if [ -f "$APP_DIR/$ENV_FILE" ]; then
              if grep -q '^CF_TUNNEL_HOMOL_TOKEN=' "$APP_DIR/$ENV_FILE"; then
                sed -i "s|^CF_TUNNEL_HOMOL_TOKEN=.*|CF_TUNNEL_HOMOL_TOKEN=${CF_TUNNEL_HOMOL_TOKEN}|" "$APP_DIR/$ENV_FILE"
              else
                echo "CF_TUNNEL_HOMOL_TOKEN=${CF_TUNNEL_HOMOL_TOKEN}" >> "$APP_DIR/$ENV_FILE"
              fi
            fi

            echo "=== HOMOL DEPLOY ==="
            echo "Image:     $DEPLOY_IMAGE"
            echo "Triggered: $GITHUB_ACTOR"
            echo "RAM livre: $(free -m | awk '/Mem/{print $4}')MB"
            echo

            cd "$APP_DIR"

            if [ ! -f "$ENV_FILE" ]; then
              echo "ERRO: $ENV_FILE não encontrado em $APP_DIR"
              exit 1
            fi

            if docker compose version > /dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            else
              COMPOSE_CMD="docker-compose"
            fi

            # Backup do banco
            if [ "$SKIP_BACKUP" != "true" ]; then
              echo ">> Backup do banco"
              mkdir -p "$BACKUP_DIR"
              BACKUP_FILE="$BACKUP_DIR/pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz"
              if docker inspect homol-quayer-postgres > /dev/null 2>&1; then
                DB_USER=$(grep '^DB_USER=' "$ENV_FILE" | cut -d= -f2 | tr -d '"')
                DB_NAME=$(grep '^DB_NAME=' "$ENV_FILE" | cut -d= -f2 | tr -d '"')
                docker exec homol-quayer-postgres pg_dump -U "${DB_USER:-quayer_homol}" "${DB_NAME:-quayer_homol}" \
                  | gzip > "$BACKUP_FILE" \
                  && echo "Backup OK: $BACKUP_FILE" \
                  || echo "Backup falhou — continuando"
                ls -t "$BACKUP_DIR"/pre-deploy-*.sql.gz 2>/dev/null | tail -n +6 | xargs -r rm -f
              else
                echo "Postgres não rodando — pulando backup"
              fi
            fi

            # Atualizar configs do repo (compose.homol.yml, entrypoint, prisma)
            echo ">> Atualizando configs"
            git fetch --depth 1 origin develop 2>/dev/null || true
            git reset --hard origin/develop 2>/dev/null || true
            git clean -fd -e .env.homol -e data/ -e backups/ 2>/dev/null || true

            # Pull da imagem pré-buildada no runner (sem docker build no servidor!)
            echo ">> Pulling image: $DEPLOY_IMAGE"
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker pull "$DEPLOY_IMAGE"
            docker tag "$DEPLOY_IMAGE" quayer-app:homol
            docker logout ghcr.io

            # Up
            echo ">> Subindo containers"
            $COMPOSE_CMD --env-file "$ENV_FILE" -f $COMPOSE_FILE up -d --force-recreate --remove-orphans

            # Health check
            echo ">> Aguardando health (até 120s)"
            MAX_WAIT=120
            INTERVAL=10
            ELAPSED=0
            HEALTHY=false
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              STATUS=$(docker inspect homol-quayer-app --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=true
                break
              fi
              echo "  [${ELAPSED}s] $STATUS"
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "FALHA: app não ficou healthy em ${MAX_WAIT}s"
              docker logs homol-quayer-app --tail 100
              if [ "$SKIP_BACKUP" != "true" ]; then
                LATEST=$(ls -t "$BACKUP_DIR"/pre-deploy-*.sql.gz 2>/dev/null | head -1)
                if [ -n "$LATEST" ]; then
                  echo ">> Rollback do banco: $LATEST"
                  DB_USER=$(grep '^DB_USER=' "$ENV_FILE" | cut -d= -f2 | tr -d '"')
                  DB_NAME=$(grep '^DB_NAME=' "$ENV_FILE" | cut -d= -f2 | tr -d '"')
                  gunzip -c "$LATEST" | docker exec -i homol-quayer-postgres psql -U "${DB_USER:-quayer_homol}" "${DB_NAME:-quayer_homol}"
                fi
              fi
              exit 1
            fi

            echo ">> HEALTHY após ${ELAPSED}s"
            docker image prune -f || true
            echo "RAM livre pós-deploy: $(free -m | awk '/Mem/{print $4}')MB"
            echo "=== Deploy concluído: https://homol.quayer.com ==="

  # ============================================
  # 4. SMOKE TEST
  # ============================================
  smoke:
    name: Smoke Test (curl)
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Healthcheck público
        run: |
          set -e
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" https://homol.quayer.com/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Healthcheck OK (200)"
              exit 0
            fi
            echo "Tentativa $i: status $STATUS — aguardando 10s"
            sleep 10
          done
          echo "Healthcheck falhou após 5 tentativas"
          exit 1

      - name: Login page renderiza
        run: |
          curl -sL https://homol.quayer.com/login | grep -qi 'quayer\|login\|signin' \
            && echo "Login page OK" \
            || (echo "Login page não retornou conteúdo esperado"; exit 1)
