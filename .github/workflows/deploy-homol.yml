name: Homol Deploy

# ============================================
# DEPLOY: push em 'develop' OU manual -> servidor homol Hetzner
# Auth: SSH key (ed25519) — NUNCA password
# Server: 167.235.139.140 (homol.quayer.com)
# Reverse proxy: nginx + Cloudflare Origin Cert
# ============================================

# NOTA: enquanto o projeto estiver em iteração rápida pré-clientes,
# use scripts/deploy.sh para deploy direto (~30s).
# Este workflow serve como backup auditado — só roda manual via workflow_dispatch.
on:
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Build sem cache (mais lento)'
        required: false
        default: false
        type: boolean
      skip_backup:
        description: 'Pular backup do banco (use em primeiro deploy)'
        required: false
        default: false
        type: boolean

concurrency:
  group: homol-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: docker
          POSTGRES_PASSWORD: docker
          POSTGRES_DB: docker_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck || npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit
        continue-on-error: true # Remover quando suite estiver sólida

  deploy:
    name: Deploy to Homol
    runs-on: ubuntu-latest
    needs: [test]
    environment:
      name: homol
      url: https://homol.quayer.com

    steps:
      - name: Deploy via SSH (key auth)
        uses: appleboy/ssh-action@v1.0.3
        env:
          CF_TUNNEL_HOMOL_TOKEN: ${{ secrets.CF_TUNNEL_HOMOL_TOKEN }}
        with:
          host: ${{ secrets.HOMOL_HOST }}
          username: ${{ secrets.HOMOL_USER }}
          key: ${{ secrets.HOMOL_SSH_KEY }}
          port: ${{ secrets.HOMOL_SSH_PORT }}
          envs: CF_TUNNEL_HOMOL_TOKEN
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/opt/quayer-homol"
            COMPOSE_FILE="compose.homol.yml"
            ENV_FILE=".env.homol"
            NO_CACHE="${{ github.event.inputs.no_cache }}"
            SKIP_BACKUP="${{ github.event.inputs.skip_backup }}"
            BACKUP_DIR="/opt/quayer-homol/backups"

            # Garante que CF_TUNNEL_HOMOL_TOKEN está no .env.homol (rotaciona se mudou)
            if [ -f "$APP_DIR/$ENV_FILE" ]; then
              if grep -q '^CF_TUNNEL_HOMOL_TOKEN=' "$APP_DIR/$ENV_FILE"; then
                sed -i "s|^CF_TUNNEL_HOMOL_TOKEN=.*|CF_TUNNEL_HOMOL_TOKEN=${CF_TUNNEL_HOMOL_TOKEN}|" "$APP_DIR/$ENV_FILE"
              else
                echo "CF_TUNNEL_HOMOL_TOKEN=${CF_TUNNEL_HOMOL_TOKEN}" >> "$APP_DIR/$ENV_FILE"
              fi
            fi

            echo "=== HOMOL DEPLOY ==="
            echo "Branch:    develop"
            echo "Commit:    ${{ github.sha }}"
            echo "Triggered: ${{ github.actor }}"
            echo

            # 1. Garantir repo
            if [ ! -d "$APP_DIR/.git" ]; then
              echo ">> Clonando repo (primeiro deploy)"
              sudo mkdir -p "$APP_DIR"
              sudo chown -R "$USER":"$USER" "$APP_DIR"
              git clone --depth 1 --single-branch --branch develop \
                https://github.com/${{ github.repository }}.git "$APP_DIR"
              cd "$APP_DIR"
            else
              cd "$APP_DIR"
            fi

            # 2. Garantir .env.homol
            if [ ! -f "$ENV_FILE" ]; then
              echo "ERRO: $ENV_FILE não encontrado em $APP_DIR"
              echo "Crie manualmente baseado em .env.homol.example"
              exit 1
            fi

            # 3. Detectar docker compose
            if docker compose version > /dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            else
              COMPOSE_CMD="docker-compose"
            fi

            # 4. Backup do banco (skipável no primeiro deploy)
            if [ "$SKIP_BACKUP" != "true" ]; then
              echo ">> Backup do banco"
              mkdir -p "$BACKUP_DIR"
              BACKUP_FILE="$BACKUP_DIR/pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz"
              if docker inspect homol-quayer-postgres > /dev/null 2>&1; then
                DB_USER=$(grep '^DB_USER=' "$ENV_FILE" | cut -d= -f2 | tr -d '"')
                DB_NAME=$(grep '^DB_NAME=' "$ENV_FILE" | cut -d= -f2 | tr -d '"')
                DB_USER=${DB_USER:-quayer_homol}
                DB_NAME=${DB_NAME:-quayer_homol}
                docker exec homol-quayer-postgres pg_dump -U "$DB_USER" "$DB_NAME" \
                  | gzip > "$BACKUP_FILE" \
                  && echo "Backup OK: $BACKUP_FILE" \
                  || (echo "Backup falhou, abortando"; exit 1)
                # Mantém só os 5 mais recentes em homol
                ls -t "$BACKUP_DIR"/pre-deploy-*.sql.gz 2>/dev/null | tail -n +6 | xargs -r rm -f
              else
                echo "Postgres não rodando — pulando backup"
              fi
            fi

            # 5. Atualizar código
            echo ">> Atualizando código"
            git fetch --depth 1 origin develop
            git reset --hard origin/develop
            git clean -fd -e .env.homol -e data/ -e backups/

            # 6. Build
            echo ">> Build"
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            if [ "$NO_CACHE" = "true" ]; then
              $COMPOSE_CMD --env-file "$ENV_FILE" -f $COMPOSE_FILE build --no-cache app
            else
              $COMPOSE_CMD --env-file "$ENV_FILE" -f $COMPOSE_FILE build app
            fi

            # 7. Up
            echo ">> Subindo"
            $COMPOSE_CMD --env-file "$ENV_FILE" -f $COMPOSE_FILE up -d --force-recreate --remove-orphans

            # 8. Health check
            echo ">> Aguardando health (até 120s)"
            MAX_WAIT=120
            INTERVAL=10
            ELAPSED=0
            HEALTHY=false
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              STATUS=$(docker inspect homol-quayer-app --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=true
                break
              fi
              echo "  [${ELAPSED}s] $STATUS"
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "FALHA: app não ficou healthy em ${MAX_WAIT}s"
              docker logs homol-quayer-app --tail 80
              # Rollback se houver backup
              if [ "$SKIP_BACKUP" != "true" ]; then
                LATEST=$(ls -t "$BACKUP_DIR"/pre-deploy-*.sql.gz 2>/dev/null | head -1)
                if [ -n "$LATEST" ]; then
                  echo ">> Rollback do banco a partir de $LATEST"
                  DB_USER=$(grep '^DB_USER=' "$ENV_FILE" | cut -d= -f2 | tr -d '"')
                  DB_NAME=$(grep '^DB_NAME=' "$ENV_FILE" | cut -d= -f2 | tr -d '"')
                  gunzip -c "$LATEST" | docker exec -i homol-quayer-postgres psql -U "${DB_USER:-quayer_homol}" "${DB_NAME:-quayer_homol}"
                fi
              fi
              exit 1
            fi

            echo ">> HEALTHY após ${ELAPSED}s"

            # 9. Limpeza
            docker image prune -f || true
            echo "=== Deploy concluído: https://homol.quayer.com ==="

  smoke:
    name: Smoke Test (curl)
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Healthcheck público
        run: |
          set -e
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" https://homol.quayer.com/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Healthcheck OK (200)"
              exit 0
            fi
            echo "Tentativa $i: status $STATUS — aguardando 10s"
            sleep 10
          done
          echo "Healthcheck falhou após 5 tentativas"
          exit 1

      - name: Login page renderiza
        run: |
          curl -sL https://homol.quayer.com/login | grep -qi 'quayer\|login\|signin' \
            && echo "Login page OK" \
            || (echo "Login page não retornou conteúdo esperado"; exit 1)
